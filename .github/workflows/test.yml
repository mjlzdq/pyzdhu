name: Tests

on:
  push:
    branches: ["**"]          # 任意分支 push 都触发（含 pyz1）
  pull_request:
    branches: [main, master]
  workflow_dispatch:          # 支持网页端手动触发

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov          # 覆盖率门禁用

      # ===== 质量门禁 =====
      # ① 任意用例失败 → pytest 退出非 0 → job 失败 → PR 不能合并
      # ② --cov-fail-under=70 → 覆盖率 < 70% 也失败
      # 把 tests/unit 改成你实际放单元测试的目录（整个项目就写 tests/）
      - name: Run unit tests + coverage gate
        run: |
          pytest tests/unit \
            --cov=. --cov-fail-under=70 \
            --alluredir=reports/allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results

  api-tests:
    runs-on: ubuntu-latest
    # 不再全局忽略失败；如需容忍外部服务波动，建议改用 --reruns + 条件判断
    # continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: pytest -m api --reruns 1
