name: Tests

# 权限：部署 Allure 报告到 GitHub Pages 需要写权限
permissions:
  contents: write
  pages: write

on:
  push:
    branches: ["**"]          # 任意分支 push 都触发（含 pyz1）
  pull_request:
    branches: [main, master]
  workflow_dispatch:          # 支持网页端手动触发

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov          # 覆盖率门禁用

      # ===== 质量门禁 =====
      # ① 任意用例失败 → pytest 退出非 0 → job 失败 → PR 不能合并
      # ② --cov-fail-under=70 → 覆盖率 < 70% 也失败
      # 把 tests/unit 改成你实际放单元测试的目录（整个项目就写 tests/）
      - name: Run unit tests + coverage gate
        run: |
          pytest tests/unit \
            --cov=. --cov-fail-under=70 \
            --alluredir=reports/allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results

  api-tests:
    runs-on: ubuntu-latest
    continue-on-error: true    # 内网服务 CI 连不到时不阻断整体流水线
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: pytest -m api --reruns 1

  # ===== W4：Allure 报告自动发布到网页 =====
  # 依赖 unit-tests 跑完，拉取 allure-results 原始数据 → 生成网页报告 → 部署到 gh-pages 分支
  allure-report:
    needs: unit-tests
    runs-on: ubuntu-latest
    if: always()               # unit-tests 即使失败也尽量出报告，方便定位
    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Get Allure history      # 保留历史趋势（多次构建的通过率曲线）
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true       # 首次没有 gh-pages 分支会跳过，正常

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Build Allure report
        run: |
          mkdir -p allure-history
          if [ -d "gh-pages/allure-history" ]; then
            cp -r gh-pages/allure-history/* allure-history/ 2>/dev/null || true
          fi
          allure generate allure-results -o allure-history --clean

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          publish_branch: gh-pages
