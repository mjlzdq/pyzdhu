# ==========================================
# 自动化测试框架 - 配置文件
# ==========================================

# 环境配置 - 支持多环境切换
environment: test  # 可选: dev / test / staging / prod

# 各环境 Base URL
environments:
  dev:
    api_base_url: "https://dev-api.example.com"
    ui_base_url: "https://dev.example.com"
  test:
    api_base_url: "https://jsonplaceholder.typicode.com"
    ui_base_url: "https://www.saucedemo.com"
  staging:
    api_base_url: "https://staging-api.example.com"
    ui_base_url: "https://staging.example.com"
  prod:
    api_base_url: "https://api.example.com"
    ui_base_url: "https://www.example.com"

# 接口测试配置
api:
  timeout: 30  # 请求超时时间（秒）
  retry: 3     # 失败重试次数
  headers:
    Content-Type: "application/json"
    Accept: "application/json"

# UI 测试配置
ui:
  browser: chromium          # 浏览器: chromium / firefox / webkit
  headless: true            # 是否无头模式
  viewport:
    width: 1920
    height: 1080
  timeout: 30000            # 默认等待超时（毫秒）
  screenshot_on_failure: true  # 失败自动截图

# 报告配置
report:
  allure_dir: "reports/allure-results"
  allure_report_dir: "reports/allure-report"
  html_dir: "reports/html"
  screenshot_dir: "reports/screenshots"
