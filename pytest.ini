[tool:pytest]
# ==================== 测试发现 ====================
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ==================== 默认参数 ====================
addopts =
    -v
    --strict-markers
    --tb=short
    --maxfail=5
    -p no:base_url
    --alluredir=reports/allure-results

# ==================== 自定义标记 ====================
markers =
    smoke: 冒烟测试用例
    regression: 回归测试用例
    api: 接口测试用例（需网络连接）
    ui: UI 测试用例（需 Playwright 浏览器）
    ddt: 数据驱动测试用例（从 xlsx/csv 文件批量执行）
    slow: 慢速测试用例
    unit: 单元测试用例（无需网络）

# ==================== 日志配置 ====================
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# ==================== 过滤警告 ====================
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning:allure.*
