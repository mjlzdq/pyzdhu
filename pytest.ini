[tool:pytest]
# Pytest 基础配置
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 命令行默认参数
addopts =
    -v
    -s
    --strict-markers
    --tb=short
    --maxfail=5
    --html=reports/html/report.html
    --self-contained-html
    --alluredir=reports/allure-results
    --clean-alluredir

# 自定义标记
markers =
    smoke: 冒烟测试用例
    regression: 回归测试用例
    api: 接口测试用例
    ui: UI 测试用例
    slow: 慢速测试用例

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
