<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>微信小程序Tab图标生成器</title>
<style>
body{font-family:-apple-system,sans-serif;background:#1a1a2e;color:#eee;padding:20px;text-align:center}
h2{margin-bottom:5px}
.info{color:#888;font-size:13px;margin-bottom:20px}
.btn{background:#07C160;color:#fff;border:none;padding:14px 28px;border-radius:8px;cursor:pointer;font-size:16px;font-weight:bold;margin:5px}
.btn:hover{background:#06a850}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:600px;margin:20px auto}
.card{background:#16213e;border-radius:12px;padding:12px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 0.2s}
.card:hover{background:#1e2a4a}
.card canvas{border-radius:6px;border:2px solid #333}
.card .name{font-weight:bold;font-size:14px}
.card .tag{font-size:11px;color:#07C160;margin-top:2px}
.downloaded{opacity:0.5;text-decoration:line-through}
.downloaded .tag{color:#888}
.downloaded canvas{border-color:#555}
.count{font-size:14px;margin:10px 0}
</style>
</head>
<body>
<h2>📱 微信小程序 Tab 图标生成器</h2>
<p class="info">81×81 像素 · 每个 &lt; 1KB · <b>点击卡片即可下载</b></p>
<p class="count">已下载：<span id="count">0</span> / 8</p>

<div class="grid" id="grid"></div>

<script>
var S = 81, C = Math.floor(S / 2);
var GR = 'rgb(153,153,153)', GN = 'rgb(7,193,96)';

function drawHome(ctx, act) {
    var c = act ? GN : GR;
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.moveTo(C, 14); ctx.lineTo(C - 26, 38); ctx.lineTo(C + 26, 38); ctx.closePath(); ctx.fill();
    ctx.fillRect(C - 26, 36, 52, 28);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(C - 8, 48, 16, 16);
    ctx.fillRect(C - 22, 44, 9, 9);
    ctx.fillRect(C + 13, 44, 9, 9);
}

function drawCat(ctx, act) {
    var c = act ? GN : GR, s = 15, g = 5;
    ctx.fillStyle = c;
    ctx.fillRect(C - s - g, C - s - g, s, s);
    ctx.fillRect(C + g, C - s - g, s, s);
    ctx.fillRect(C - s - g, C + g, s, s);
    ctx.fillRect(C + g, C + g, s, s);
}

function drawSearch(ctx, act) {
    var c = act ? GN : GR;
    ctx.beginPath(); ctx.arc(C - 3, C - 3, 17, 0, Math.PI * 2); ctx.fillStyle = c; ctx.fill();
    ctx.beginPath(); ctx.arc(C - 3, C - 3, 11, 0, Math.PI * 2); ctx.fillStyle = '#ffffff'; ctx.fill();
    ctx.strokeStyle = c; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(C + 9, C + 9); ctx.lineTo(C + 17, C + 17); ctx.stroke();
}

function drawMine(ctx, act) {
    var c = act ? GN : GR;
    ctx.beginPath(); ctx.arc(C, 24, 13, 0, Math.PI * 2); ctx.fillStyle = c; ctx.fill();
    ctx.beginPath(); ctx.arc(C, 56, 22, Math.PI, 0); ctx.fillStyle = c; ctx.fill();
}

var icons = [
    ['home.png', drawHome, false, '首页 - 默认'],
    ['home-active.png', drawHome, true, '首页 - 选中'],
    ['category.png', drawCat, false, '分类 - 默认'],
    ['category-active.png', drawCat, true, '分类 - 选中'],
    ['search.png', drawSearch, false, '搜索 - 默认'],
    ['search-active.png', drawSearch, true, '搜索 - 选中'],
    ['mine.png', drawMine, false, '我的 - 默认'],
    ['mine-active.png', drawMine, true, '我的 - 选中'],
];

var downloaded = {};
var count = 0;

function makeDataUrl(fn, act) {
    var canvas = document.createElement('canvas');
    canvas.width = S; canvas.height = S;
    var ctx = canvas.getContext('2d');
    fn(ctx, act);
    return canvas.toDataURL('image/png');
}

function download(name, fn, act) {
    if (downloaded[name]) return;
    var url = makeDataUrl(fn, act);
    var a = document.createElement('a');
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    downloaded[name] = true;
    count++;
    document.getElementById('count').textContent = count;
}

var grid = document.getElementById('grid');
icons.forEach(function(entry) {
    var name = entry[0], fn = entry[1], act = entry[2], label = entry[3];
    
    var card = document.createElement('div');
    card.className = 'card';
    card.title = '点击下载 ' + name;
    
    var cv = document.createElement('canvas');
    cv.width = S; cv.height = S;
    var ctx = cv.getContext('2d');
    fn(ctx, act);
    
    var info = document.createElement('div');
    info.style.textAlign = 'left';
    info.innerHTML = '<div class="name">' + label + '</div><div class="tag">' + (act ? '✅ 选中态' : '⚪ 默认态') + '</div><div style="color:#888;font-size:11px">🖱️ 点击下载</div>';
    
    card.appendChild(cv);
    card.appendChild(info);
    
    card.addEventListener('click', function() {
        download(name, fn, act);
        card.classList.add('downloaded');
        card.querySelector('.tag').textContent = '✅ 已下载';
        card.querySelector('div:last-child').textContent = '';
    });
    
    grid.appendChild(card);
});
</script>
</body>
</html>
