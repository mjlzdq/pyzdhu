<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>生成Tab图标 - 点击下载</title></head>
<body style="background:#1a1a2e;color:#fff;font-family:system-ui;padding:20px">
<h1>🎨 微信小程序 Tab 图标生成</h1>
<p>点击按钮下载 8 个小体积图标（纯Canvas绘制，每个约3-5KB）</p>
<button id="btn" style="padding:15px 30px;font-size:20px;cursor:pointer;background:#07C160;color:#fff;border:none;border-radius:8px">⬇️ 生成并下载全部 8 个图标</button>
<div id="out" style="margin-top:15px;white-space:pre-wrap;font-family:monospace;background:#0f0f23;padding:12px;border-radius:6px"></div>
<script>
const S=81,C=Math.floor(S/2);
function mk(){const c=document.createElement('canvas');c.width=S;c.height=S;return{c,ctx:c.getContext('2d')}}
function save(name,cv){
    const url=cv.c.toDataURL('image/png');
    const b64=url.split(',')[1];
    const size=(atob(b64).length/1024).toFixed(1);
    const a=document.createElement('a');
    a.href=url;a.download=name;a.click();
    return size;
}
function home(act){
    const{ctx}=mk();
    const c=act?'#07C160':'#999999';
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(C,14);ctx.lineTo(C-26,38);ctx.lineTo(C+26,38);ctx.fill();
    ctx.fillRect(C-26,36,52,28);
    ctx.fillStyle='#fff';ctx.fillRect(C-8,48,16,16);ctx.fillRect(C-22,44,9,9);ctx.fillRect(C+13,44,9,9);
    return mk().c;
}
function cat(act){
    const{c,ctx}=mk();
    ctx.fillStyle=act?'#07C160':'#999999';
    const s=15,g=5;
    ctx.fillRect(C-s-g,C-s-g,s,s);ctx.fillRect(C+g,C-s-g,s,s);
    ctx.fillRect(C-s-g,C+g,s,s);ctx.fillRect(C+g,C+g,s,s);
    return c;
}
function search(act){
    const{c,ctx}=mk();
    ctx.strokeStyle=act?'#07C160':'#999999';
    ctx.lineWidth=5;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(C-3,C-3,16,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();
    const a=Math.PI/4,hx=C-3+Math.cos(a)*14,hy=C-3+Math.sin(a)*14;
    ctx.moveTo(hx,hy);ctx.lineTo(C+13,C+13);ctx.stroke();
    return c;
}
function mine(act){
    const{c,ctx}=mk();
    ctx.fillStyle=act?'#07C160':'#999999';
    ctx.beginPath();ctx.arc(C,24,13,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(C,56,22,Math.PI,0,true);ctx.fill();
    return c;
}
document.getElementById('btn').onclick=function(){
    const btn=this;btn.disabled=true;btn.textContent='生成中...';
    const o=document.getElementById('out');o.textContent='';
    const list=[
        ['home.png',home(false)],['home-active.png',home(true)],
        ['category.png',cat(false)],['category-active.png',cat(true)],
        ['search.png',search(false)],['search-active.png',search(true)],
        ['mine.png',mine(false)],['mine-active.png',mine(true)]
    ];
    let ok=true;
    list.forEach(([name,canvas])=>{
        const sz=save(name,{c:canvas});
        const pass=sz<=40;
        if(!pass)ok=false;
        o.textContent+=(pass?'✅':'❌')+' '+name+' — '+sz+' KB\n';
    });
    o.textContent+='\n'+(ok?'🎉 全部成功！请将文件移动到 images/tab/ 目录':'⚠️ 部分文件过大')+'\n';
    o.textContent+='然后删除所有 Tiny_ 开头和 A_simple 开头的旧文件\n';
    btn.textContent='✅ 已下载';btn.style.background='#333';
};
</script>
</body>
</html>
